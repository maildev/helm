replicaCount: 1

image:
  repository: maildev/maildev
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Enable verbose logging (--verbose).
verbose: false

# Escape hatches for maildev options this chart does not model directly.
# See https://github.com/maildev/maildev#usage for all flags/env vars.
# Extra CLI args appended after the flags the chart generates, e.g.:
#   extraArgs:
#     - --hide-extensions
#     - STARTTLS
extraArgs: []
# Extra container env vars, passed through verbatim (supports valueFrom).
# Quote string/numeric values yourself, e.g.:
#   extraEnv:
#     - name: MAILDEV_OUTGOING_PASS
#       valueFrom:
#         secretKeyRef:
#           name: maildev-smtp
#           key: password
extraEnv: []

outgoingRelay:
  # # MAILDEV_OUTGOING_HOST
  # host: smtp.gmail.com
  # # MAILDEV_OUTGOING_PORT
  # port: 465
  # # MAILDEV_OUTGOING_USER
  # user: 'XXX'
  # # MAILDEV_OUTGOING_PASS
  # pass: 'YYY'
  # Use SMTP SSL for outgoing emails (--outgoing-secure).
  secure: false
  autoRelay:
    # Relay all incoming emails to the outgoing SMTP relay (--auto-relay).
    enabled: false
    # Relay to a single receiver instead of the original recipient, MAILDEV_AUTO_RELAY.
    # receiver: test@example.com
    # Auto relay rules, rendered to the auto-relay-rules.json config file.
    rules:
      - allow: '*'

incoming: {}
  # # MAILDEV_INCOMING_USER
  # user:
  # # MAILDEV_INCOMING_PASS
  # pass:

ports:
  # MAILDEV_SMTP_PORT
  smtp: 1025
  # MAILDEV_WEB_PORT
  web: 1080

# MAILDEV_HTTPS - Enable TLS for the web interface
https:
  enabled: false
  # Name of an existing Kubernetes TLS Secret to use for HTTPS.
  # The secret must be of type kubernetes.io/tls and contain tls.crt and tls.key keys.
  # Required when enabled: true
  # secretName: my-tls-secret

# Web interface
web:
  # Disable the web interface (--disable-web).
  disable: false
  # # MAILDEV_WEB_USER
  # user: admin
  # # MAILDEV_WEB_PASS
  # pass: admin

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
